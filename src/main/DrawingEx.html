 <html>
    <script type="text/javascript">
        //add a variable for tolerance, which is an x and y threshold for which the stepper will ignore the point and not generate code for it
        //migrating from pure allPoses to allPoses + allChanges
    var canvas, ctx, flag = false,
        prevX = 0,
        currX = 0,
        prevY = 0,
        currY = 0,
        dot_flag = false;


    var x = "black",
        y = 2;
    
    var allPoses = [ //allPoses stores coordinates of the drawing
        {x:400,y:400},
        {x: 0, y: 0}
    ];
    var code = [ 
        "#include <AccelStepper.h>",
        "#define FULLSTEP 4",
        "#define STP 2700",
        "AccelStepper xStepper(FULLSTEP, 11, 9, 10, 8);",
        "AccelStepper yStepper(FULLSTEP, 7, 5, 6, 4);",
        "void setup(){",
        "Serial.begin(9600);",
        "xStepper.serMaxSpeed(1000.0);", //adjust to fit your hardware
        "xStepper.serAcceleration(50.0);",
        "xStepper.setSpeed(200);",
        "xStepper.serCurrentPosition(0);",
        "yStepper.serMaxSpeed(1000.0);", //adjust to fit your hardware
        "yStepper.serAcceleration(50.0);",
        "yStepper.setSpeed(200);",
        "yStepper.serCurrentPosition(0);}",
        "void loop(){",
        "int zero = 0;",
        "moveToPose(400,400);",
        "moveToPose*(zero, zero);",
        "}",
        "void moveTo(int x, int y){",
        "int real_x = map(x,0,400, STP, -STP);",
        "int real_y = map(y,0,400,STP,-STP);",
        "xStepper.moveTo(real_x);",
        "yStepper.moveTo(real_y);",
        "while(xStepper.distanceToGo() != 0 || yStepper.distanceToGo() != 0){",
        "yStepper.run();",
        "xStepper.run();}}",
    ];

    var allChanges = [//this array should store all relevant changes to the color and pen motion
        {event:"black", poseInt:0},
        {event:"PenUP", poseInt:0},
        {event: "PenDOWN", poseInt:0}
    ]; 
    
    function init() {
        canvas = document.getElementById('can');
        ctx = canvas.getContext("2d");
        w = canvas.width;
        h = canvas.height;
    
        canvas.addEventListener("mousemove", function (e) {
            findxy('move', e)
        }, false);
        canvas.addEventListener("mousedown", function (e) {
            findxy('down', e)
        }, false);
        canvas.addEventListener("mouseup", function (e) {
            findxy('up', e)
        }, false);
        canvas.addEventListener("mouseout", function (e) {
            findxy('out', e)
        }, false);
    }
    
    function color(obj) {
        switch (obj.id) {
            case "green":
                x = "green";
                break;
            case "blue":
                x = "blue";
                break;
            case "red":
                x = "red";
                break;
            case "yellow":
                x = "yellow";
                break;
            case "orange":
                x = "orange";
                break;
            case "black":
                x = "black";
                break;
            case "white":
                x = "white";
                break;
        }
        if (x == "white") y = 14;
        else y = 2;
        // allPoses.push(
        // {
        //     x:"Color = " + obj.id, 
        //     y: 0
        // });
        allChanges.push(
            {event: "setColor(" + obj.id + ");", 
            poseInt: allPoses.length}
        );
    }
    
    function draw() {
        ctx.beginPath();
        ctx.moveTo(prevX, prevY);
        ctx.lineTo(currX, currY);
        ctx.strokeStyle = x;
        ctx.lineWidth = y;
        ctx.stroke();
        ctx.closePath();
    }
    
    function erase() {
        var m = confirm("Want to clear");
        if (m) {
            ctx.clearRect(0, 0, w, h);
            document.getElementById("canvasimg").style.display = "none";
        }
        allPoses = [{x:0,y:0}];
        allChanges = [{event:"PenUP", poseInt:0},{event:"PenDOWN", poseInt:0}];
    }
    
    function save() {
        document.getElementById("canvasimg").style.border = "2px solid";
        var dataURL = canvas.toDataURL();
        document.getElementById("canvasimg").src = dataURL;
        document.getElementById("canvasimg").style.display = "inline";
    }
    
    function getAllPoses() {
        //pose bounds are 0-400 for x and y (fortunately its square so that makes things easier)
        //top-left is 0,0 and bottom right is 400,400

        //reformat output to fit REAL code
        // const color = "Color = " + x + "\n";
        // const csvContent = allPoses
        //     .map(pos => `${pos.x},${pos.y}`)
        //     .join("\n");
        //change to replace the above map with later:
        for(var i=0; i < allPoses.length; i++){
            var curPose = allPoses[i];
            var prevPose = i > 0 ? allPoses[i-1] : null; //var used to compare prevPose against threshold
            var tolerance = 5; //max diff to not consider a distinct point
            //runs checks to make sure that 
            if(allPoses.length <= 1 || (prevPose && !(Math.abs(curPose.x - prevPose.x) >= tolerance && Math.abs(curPose.y - prevPose.y) >= tolerance))){
                code.push("moveToPose(" + curPose.x + " , " + curPose.y + ");");
                //if this is the first pose, then automatically push the new pose. 
                //If this isn't the first pose, then check to make sure it's at least 5 away in both x and y from the previous pose.
           }
           //at each iteration, check all changes to see which match the current position
           allChanges.forEach(change => {
            if(change.poseInt == i){
                code.push((change.event.includes("setColor") ? change.event : (change.event + "();")));
            }});
        }
        const csvContent = code
            .map(line => line)
            .join("\n");

        const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "gcode.txt";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    function storePose(x,y){
        //add math to convert these coordinates from canvas -> steppers
        allPoses.push({x: x, y: y});
    }

    function penUp(){ //adds a marker to move the servo holding the pen up
        // allPoses.push(
        //     {
        //         x:"PEN_UP",
        //         y:0
        //     }
        // );
        allChanges.push({event: "PenUp",poseInt: allPoses.length});
    }

    function penDown(){
        // allPoses.push(
        //     {
        //         x: "PEN_DOWN",
        //         y:0
        //     }
        // );
        allChanges.push({event:"PenDown",poseInt: allPoses.length});
    }

    function findxy(res, e) {
        if (res == 'down') {
            prevX = currX;
            prevY = currY;
            currX = e.clientX - canvas.offsetLeft;
            currY = e.clientY - canvas.offsetTop;
    
            flag = true;
            dot_flag = true;
            if (dot_flag) {
                ctx.beginPath();
                ctx.fillStyle = x;
                ctx.fillRect(currX, currY, 2, 2);
                ctx.closePath();
                dot_flag = false;
            }
        }
        if (res == 'up' || res == "out") {
            flag = false;
        }
        if (res == 'move') {
            if (flag) {
                prevX = currX;
                prevY = currY;
                currX = e.clientX - canvas.offsetLeft;
                currY = e.clientY - canvas.offsetTop;
                draw();
                storePose(currX, currY);
            }
        }
    }
    </script>
    <body onload="init()">
        <canvas id="can" width="400" height="400" style="position:absolute;top:10%;left:10%;border:2px solid;"></canvas>
        <div style="position:absolute;top:12%;left:43%;">Choose Color</div>
        
        <div style="position:absolute;top:15%;left:45%;width:10px;height:10px;background:green;" id="green" onclick="color(this)"></div>
        <div style="position:absolute;top:15%;left:46%;width:10px;height:10px;background:blue;" id="blue" onclick="color(this)"></div>
        <div style="position:absolute;top:15%;left:47%;width:10px;height:10px;background:red;" id="red" onclick="color(this)"></div>
        <div style="position:absolute;top:17%;left:45%;width:10px;height:10px;background:yellow;" id="yellow" onclick="color(this)"></div>
        <div style="position:absolute;top:17%;left:46%;width:10px;height:10px;background:orange;" id="orange" onclick="color(this)"></div>
        <div style="position:absolute;top:17%;left:47%;width:10px;height:10px;background:black;" id="black" onclick="color(this)"></div>
        <div style="position:absolute;top:20%;left:43%;">Eraser</div>
        <div style="position:absolute;top:22%;left:45%;width:15px;height:15px;background:white;border:2px solid;" id="white" onclick="color(this)"></div>
        <img id="canvasimg" style="position:absolute;top:10%;left:52%;" style="display:none;" alt="canvas to draw on">
        <input type="button" value="save" id="btn" size="30" onclick="save()" style="position:absolute;top:58%;left:10%;">
        <input type="button" value="clear" id="clr" size="23" onclick="erase()" style="position:absolute;top:58%;left:15%;">
        <input type = "button" value="Export as Gcode (WIP)" id="exp" size="35" onclick="getAllPoses()"style="position:absolute; top:58%;left:29.5%;">
        <input type="button" value="Pen Up" id ="pup" size=30 onclick="penUp()" style="position:absolute; top:50%; left:46%">
        <input type="button" value="Pen Down" id="pdwn" size=30 onclick="penDown()" style="position:absolute; top:50%; left:40%">
    </body>
    </html>
